<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pizza Mama</title>

    <style>
        body{
    background: linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url("https://png.pngtree.com/thumb_back/fh260/back_our/20190622/ourmid/pngtree-seafood-vegetable-pizza-gourmet-background-poster-image_214182.jpg") no-repeat center fixed;
    -webkit-background-size: cover;
    -moz-background-size: cover;
    -o-background-size: cover;
    background-size: cover;
    margin: 0;
    font-family: Arial;
    margin-bottom: 4%;
  }

  .centrer{
    width: 13cm;
    background-color: rgba(40, 4, 247, 1);
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 2% 4px;
    border-radius: 50%;
    border: double 2px wheat;
  }

  .title{
    font-family: Cambria, Cochin;
    font-size: 52px;
    text-align: center;
    color: white;
    text-transform: lowercase;

  }

  .texto{
    color: rgb(255, 247, 7);
    text-align: center;
    font-style: oblique;
    font-size: 20px;
    margin-top: -25px;
    text-transform: capitalize;
    font-family: 'Courier New', Courier, monospace;
  }

  a{
    display: block;
    text-align: center;
    color: rgb(13, 16, 44);
    margin-top: 30px;
    font-size: 18px;
    border: solid 4px rgb(166, 134, 134);
    text-decoration: none;
    font-weight: bold;
    width: 125px;
    padding: 2px 4px;
    margin-left: auto;
    margin-right: auto;
    background-color: rgb(193, 245, 52);
  }

  a:hover{
    color: black;
    background-color: rgb(253, 139, 9);
    border: solid 4px white;
  }

    </style>

</head>
<body>
   <div class="centrer">
    <h1 class="title">P i z z a&emsp;M a m a</h1>
    <p class="texto">La Passion des pizzas</p>
    <a href="{% url 'menu:index' %}">Voir le Menu</a>
    </div>
</body>
</html>
