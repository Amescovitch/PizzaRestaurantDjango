{% load static %}

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page de commande</title>
    <link rel="stylesheet" href="{% static 'commande/style.css' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <style>
                /* style pour desktop*/

        body{
            background-color: rgb(108, 112, 115);
            margin-top: 80px;
            font-family: Cambria;
            font-size: larger;
        }

        .corps{
            background-color: rgb(132, 52, 52, 0.2);
            margin: -40px 250px 10px 250px;
            padding: 10px;
        }

        .titre{
            color: whitesmoke;
            font-weight: bold;
            font-size: x-large;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 2px 2px 4px #000000;
        }

        .name{
            text-align: center;
            margin-top: 15px;
            height: 50px;
            width: 300px;
            border: solid burlywood 3px;
            border-left: solid red 3px;
        }

        .email{
            text-align: center;
            margin-top: 15px;
            height: 50px;
            width: 300px;
            border: solid burlywood 3px;
            border-left: solid rgb(3, 254, 3) 3px;
        }

        .telephone{
            text-align: center;
            margin-top: 15px;
            height: 50px;
            width: 300px;
            border: solid burlywood 3px;
            border-left: solid red 3px;
        }

        .description{
            text-align: center;
            margin-top: 15px;
            height: 100px;
            width: 400px;
            border: solid burlywood 3px;
            border-left: solid red 3px;
        }

        .envoyer{
            margin-top: 15px;
            height: 35px;
            width: 150px;
            font-weight: bold;
            color: whitesmoke;
            background-color: rgb(72, 72, 82);
            border: solid burlywood 3px;
        }

        a{
            display: inline-block;
            text-decoration: none;
            font-size: 20px;
            padding: 2px 7px;
            border: solid 2px rgb(34, 74, 131);
            margin: 38px 38px 10px 38px;
            background-color: burlywood;
        }

        a:link {color: rgb(174, 31, 31)}
        a:visited {color: rgb(163, 32, 32)}
        a:hover {color: rgb(183, 21, 21)}
        a:active {color: rgb(3, 250, 3);}
    
        .retour{
            margin-top: 20px;
        }

        ::placeholder { /* Chrome, Firefox, Opera, Safari 10.1+ */
            color: rgb(69, 68, 68);
            opacity: 1; /* Firefox */
        }

        .reponse{
            text-align: center;
            color: rgb(6, 250, 6);
            font-style: italic;

        }

        /*responsive design for mobile*/
   
    </style>

</head>
<body>

    <div class="corps">
        <div>
            <p class="titre">
                Veuillez remplir le formulaire de commande ci-dessous.
            </p>
        </div>
        <section class="form">
            {% block content %}
            <p class="reponse">{{ message }}</p>
            <center>
                <form method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="envoyer"> COMMANDER </button>
                </form>
            </center>
            {% endblock %}  
        </section>
        
        <center>
                <a href="{% url 'menu:index' %}" class="retour"> Retour menu</a>
                <a href="{% url 'main:index' %}" class="retour"> Retour accueil</a>
        </center>
    
    </div>

</body>
</html>
